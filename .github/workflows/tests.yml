name: backend-tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dawal
          POSTGRES_PASSWORD: dawal
          POSTGRES_DB: dawal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dawal -d dawal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      # Tests use their own transaction-rolled-back / real-connection sessions
      # against dawal_test; app engine is never actually hit (get_db overridden,
      # scheduler off) but we point it at the same DB for safety.
      TEST_DATABASE_URL: postgresql+psycopg://dawal:dawal@localhost:5432/dawal_test
      DATABASE_URL: postgresql+psycopg://dawal:dawal@localhost:5432/dawal_test
      SCHEDULER_ENABLED: "false"
      SMS_PROVIDER: mock
      JWT_SECRET: ci-test-secret-at-least-32-bytes-long-000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend + test deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest httpx

      - name: Run test suite
        working-directory: backend
        run: pytest -q
